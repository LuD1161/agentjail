  <rect x="484" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#f8514944" stroke-width="1"/>
  <text x="500" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f85149">SECURITY FIX</text>
