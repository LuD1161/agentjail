  <text x="36" y="172" font-family="monospace" font-size="10" fill="#484f58">npm, pip, Docker audit</text>

  <rect x="252" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#58a6ff44" stroke-width="1"/>
