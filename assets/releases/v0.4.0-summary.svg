  <text x="268" y="100" font-family="monospace" font-size="10" fill="#8b949e">Project selector in UI</text>
  <text x="268" y="116" font-family="monospace" font-size="10" fill="#8b949e">Policy overrides per project</text>
  <text x="268" y="132" font-family="monospace" font-size="10" fill="#8b949e">Reverse MCP index</text>
  <text x="268" y="152" font-family="monospace" font-size="10" fill="#8b949e">Tools &#x26; skills discovery</text>
