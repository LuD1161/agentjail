  <rect x="20" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#3fb95044" stroke-width="1"/>
  <text x="36" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3fb950">MCP INVENTORY</text>
  <text x="36" y="100" font-family="monospace" font-size="10" fill="#3fb950">agentjail mcp scan</text>
