<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" fill="none">
  <rect width="720" height="180" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="12" width="720" height="36" fill="#161b22"/>
  <circle cx="24" cy="24" r="6" fill="#3fb950"/>
  <text x="44" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#f0f6fc">agentjail v0.2.6</text>
  <text x="210" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e">Daemon auto-update</text>

  <!-- Three cards -->
  <rect x="20" y="60" width="216" height="104" rx="8" fill="#1c2128" stroke="#3fb95044" stroke-width="1"/>
  <text x="36" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3fb950">AUTO-UPDATE</text>
  <text x="36" y="97" font-family="monospace" font-size="10" fill="#f85149">Before: manual agentjail update</text>
  <text x="36" y="113" font-family="monospace" font-size="10" fill="#3fb950">After: daemon updates itself</text>
  <text x="36" y="129" font-family="monospace" font-size="10" fill="#8b949e">download &#x2192; verify &#x2192; swap &#x2192; restart</text>
  <text x="36" y="150" font-family="monospace" font-size="10" fill="#484f58">&#x2192; updates within ~6 hours</text>

  <rect x="252" y="60" width="216" height="104" rx="8" fill="#1c2128" stroke="#58a6ff44" stroke-width="1"/>
  <text x="268" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#58a6ff">CROSS-PLATFORM</text>
  <text x="268" y="97" font-family="monospace" font-size="10" fill="#8b949e">macOS: launchd KeepAlive</text>
  <text x="268" y="113" font-family="monospace" font-size="10" fill="#8b949e">Linux: systemd user service</text>
  <text x="268" y="129" font-family="monospace" font-size="10" fill="#8b949e">opt-out: AUTO_UPDATE=false</text>
  <text x="268" y="150" font-family="monospace" font-size="10" fill="#484f58">&#x2192; same pattern as rustup</text>

  <rect x="484" y="60" width="216" height="104" rx="8" fill="#1c2128" stroke="#a371f744" stroke-width="1"/>
  <text x="500" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#a371f7">SHARED INFRA</text>
  <text x="500" y="97" font-family="monospace" font-size="10" fill="#8b949e">internal/selfupdate/ package</text>
  <text x="500" y="113" font-family="monospace" font-size="10" fill="#8b949e">minisign + SHA256 verify</text>
  <text x="500" y="129" font-family="monospace" font-size="10" fill="#8b949e">atomic binary swap + rollback</text>
  <text x="500" y="150" font-family="monospace" font-size="10" fill="#484f58">&#x2192; CLI + daemon share code</text>
</svg>
