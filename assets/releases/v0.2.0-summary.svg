<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" fill="none">
  <rect width="720" height="260" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="12" width="720" height="36" fill="#161b22"/>
  <circle cx="24" cy="24" r="6" fill="#f97316"/>
  <text x="44" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#f0f6fc">agentjail v0.2.0</text>
  <text x="210" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e">How self-protection works now</text>

  <!-- The problem -->
  <text x="32" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f85149" letter-spacing="1">THE PROBLEM</text>
  <rect x="32" y="88" width="300" height="36" rx="6" fill="#1c2128" stroke="#f8514933" stroke-width="1"/>
  <text x="44" y="110" font-family="monospace" font-size="11" fill="#8b949e">git add cmd/agentjail/update.go</text>
  <text x="320" y="110" font-family="monospace" font-size="11" fill="#f85149" text-anchor="end">BLOCKED</text>

  <!-- The fix -->
  <text x="388" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3fb950" letter-spacing="1">THE FIX</text>
  <rect x="388" y="88" width="300" height="36" rx="6" fill="#1c2128" stroke="#3fb95033" stroke-width="1"/>
  <text x="400" y="110" font-family="monospace" font-size="11" fill="#8b949e">Parse commands into binaries</text>
  <text x="676" y="110" font-family="monospace" font-size="11" fill="#3fb950" text-anchor="end">["git"]</text>

  <!-- Three pillars -->
  <text x="32" y="152" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">THREE LAYERS OF PROTECTION</text>

  <!-- Pillar 1 -->
  <rect x="32" y="164" width="210" height="76" rx="8" fill="#1c2128" stroke="#f9731666" stroke-width="1.5"/>
  <circle cx="52" cy="184" r="8" fill="#f9731633"/>
  <text x="52" y="188" font-family="system-ui,sans-serif" font-size="11" fill="#f97316" text-anchor="middle">1</text>
  <text x="68" y="188" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">Structured Parsing</text>
  <text x="48" y="206" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Daemon parses commands into</text>
  <text x="48" y="220" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">binary names before OPA eval</text>
  <text x="48" y="234" font-family="system-ui,sans-serif" font-size="9" fill="#f97316">signals + UX</text>

  <!-- Pillar 2 -->
  <rect x="256" y="164" width="210" height="76" rx="8" fill="#1c2128" stroke="#3fb95066" stroke-width="1.5"/>
  <circle cx="276" cy="184" r="8" fill="#3fb95033"/>
  <text x="276" y="188" font-family="system-ui,sans-serif" font-size="11" fill="#3fb950" text-anchor="middle">2</text>
  <text x="292" y="188" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">Shield Enforcement</text>
  <text x="272" y="206" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Kernel denies writes to hook</text>
  <text x="272" y="220" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">configs via Seatbelt/Landlock</text>
  <text x="272" y="234" font-family="system-ui,sans-serif" font-size="9" fill="#3fb950">enforcement</text>

  <!-- Pillar 3 -->
  <rect x="480" y="164" width="210" height="76" rx="8" fill="#1c2128" stroke="#58a6ff66" stroke-width="1.5"/>
  <circle cx="500" cy="184" r="8" fill="#58a6ff33"/>
  <text x="500" y="188" font-family="system-ui,sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">3</text>
  <text x="516" y="188" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">Hook Watchdog</text>
  <text x="496" y="206" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Monitors configs every 5s,</text>
  <text x="496" y="220" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">re-injects hook if removed</text>
  <text x="496" y="234" font-family="system-ui,sans-serif" font-size="9" fill="#58a6ff">self-healing</text>
</svg>
