<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <rect width="720" height="220" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="12" width="720" height="36" fill="#161b22"/>
  <circle cx="24" cy="24" r="6" fill="#3fb950"/>
  <text x="44" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#f0f6fc">agentjail v0.2.7</text>
  <text x="210" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e">Interactive replay TUI</text>

  <!-- Three cards -->
  <rect x="20" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#3fb95044" stroke-width="1"/>
  <text x="36" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3fb950">INTERACTIVE TUI</text>
  <text x="36" y="100" font-family="monospace" font-size="10" fill="#8b949e">j/k scroll, g/G jump</text>
  <text x="36" y="116" font-family="monospace" font-size="10" fill="#8b949e">/ live substring filter</text>
  <text x="36" y="132" font-family="monospace" font-size="10" fill="#8b949e">Enter expand row detail</text>
  <text x="36" y="148" font-family="monospace" font-size="10" fill="#8b949e">f follow mode (live tail)</text>
  <text x="36" y="168" font-family="monospace" font-size="10" fill="#3fb950">replay -session 625d86f1</text>
  <text x="36" y="188" font-family="monospace" font-size="10" fill="#484f58">bubbletea + viewport</text>

  <rect x="252" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#58a6ff44" stroke-width="1"/>
  <text x="268" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#58a6ff">COLORED OUTPUT</text>
  <text x="268" y="100" font-family="monospace" font-size="10" fill="#3fb950">ALLOW</text>
  <text x="310" y="100" font-family="monospace" font-size="10" fill="#f85149">DENY</text>
  <text x="347" y="100" font-family="monospace" font-size="10" fill="#d29922">ASK</text>
  <text x="268" y="120" font-family="monospace" font-size="10" fill="#8b949e">Agent glyphs (Claude, Codex)</text>
  <text x="268" y="140" font-family="monospace" font-size="10" fill="#8b949e">Bold headers, dim rules</text>
  <text x="268" y="160" font-family="monospace" font-size="10" fill="#8b949e">Summary line with counts</text>
  <text x="268" y="180" font-family="monospace" font-size="10" fill="#484f58">--no-color / NO_COLOR</text>

  <rect x="484" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#a371f744" stroke-width="1"/>
  <text x="500" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#a371f7">SMARTER CLI</text>
  <text x="500" y="100" font-family="monospace" font-size="10" fill="#f0f6fc">8-char session prefixes</text>
  <text x="500" y="120" font-family="monospace" font-size="10" fill="#8b949e">Prefix resolution (exact first)</text>
  <text x="500" y="140" font-family="monospace" font-size="10" fill="#8b949e">Paginated loading (no cap)</text>
  <text x="500" y="160" font-family="monospace" font-size="10" fill="#8b949e">--basic for plain text</text>
  <text x="500" y="180" font-family="monospace" font-size="10" fill="#484f58">Auto TTY/dumb detection</text>
</svg>
