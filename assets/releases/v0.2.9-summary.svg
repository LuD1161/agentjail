<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <rect width="720" height="220" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="12" width="720" height="36" fill="#161b22"/>
  <circle cx="24" cy="24" r="6" fill="#3fb950"/>
  <text x="44" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#f0f6fc">agentjail v0.2.9</text>
  <text x="210" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e">MCP inventory &#x26; per-project policy</text>

  <!-- Three cards -->
  <rect x="20" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#3fb95044" stroke-width="1"/>
