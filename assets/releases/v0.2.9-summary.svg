  <text x="36" y="132" font-family="monospace" font-size="10" fill="#8b949e">Docker container discovery</text>
  <text x="36" y="152" font-family="monospace" font-size="10" fill="#8b949e">Security audit per server</text>
  <text x="36" y="172" font-family="monospace" font-size="10" fill="#484f58">full MCP surface map</text>

  <rect x="252" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#58a6ff44" stroke-width="1"/>
  <text x="268" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#58a6ff">PER-PROJECT POLICY</text>
  <text x="268" y="100" font-family="monospace" font-size="10" fill="#8b949e">Project-scoped overrides</text>
  <text x="268" y="116" font-family="monospace" font-size="10" fill="#8b949e">Reverse MCP index</text>
  <text x="268" y="132" font-family="monospace" font-size="10" fill="#8b949e">Project selector in web UI</text>
  <text x="268" y="152" font-family="monospace" font-size="10" fill="#8b949e">Per-project policy view</text>
