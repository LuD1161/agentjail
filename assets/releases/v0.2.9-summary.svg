  <rect x="484" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#a371f744" stroke-width="1"/>
  <text x="500" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#a371f7">SKILL &#x26; TOOL POLICY</text>
  <text x="500" y="100" font-family="monospace" font-size="10" fill="#8b949e">Per-skill allow/block/ask</text>
