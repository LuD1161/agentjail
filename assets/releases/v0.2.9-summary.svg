  <text x="500" y="132" font-family="monospace" font-size="10" fill="#8b949e">Session log discovery</text>
  <text x="500" y="152" font-family="monospace" font-size="10" fill="#8b949e">Remote MCP connectors</text>
  <text x="500" y="172" font-family="monospace" font-size="10" fill="#484f58">discovered_tools table</text>
