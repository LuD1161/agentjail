<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <rect width="720" height="220" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="12" width="720" height="36" fill="#161b22"/>
  <circle cx="24" cy="24" r="6" fill="#3fb950"/>
  <text x="44" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#f0f6fc">agentjail v0.3.0</text>
  <text x="210" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e">Sessions &#x26; Cobra CLI</text>

  <!-- Three cards -->
  <rect x="20" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#3fb95044" stroke-width="1"/>
  <text x="36" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3fb950">SESSION TRACKING</text>
  <text x="36" y="100" font-family="monospace" font-size="10" fill="#3fb950">agentjail sessions list</text>
  <text x="36" y="116" font-family="monospace" font-size="10" fill="#8b949e">PID-based active detection</text>
  <text x="36" y="132" font-family="monospace" font-size="10" fill="#8b949e">Process tree walking</text>
  <text x="36" y="152" font-family="monospace" font-size="10" fill="#8b949e">Session names from metadata</text>
  <text x="36" y="172" font-family="monospace" font-size="10" fill="#484f58">SQLite session store</text>

  <rect x="252" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#58a6ff44" stroke-width="1"/>
  <text x="268" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#58a6ff">COBRA CLI</text>
  <text x="268" y="100" font-family="monospace" font-size="10" fill="#8b949e">Automatic --help generation</text>
  <text x="268" y="116" font-family="monospace" font-size="10" fill="#8b949e">Shell completions (zsh/bash)</text>
  <text x="268" y="132" font-family="monospace" font-size="10" fill="#8b949e">Subcommand groups</text>
  <text x="268" y="152" font-family="monospace" font-size="10" fill="#8b949e">Consistent flag parsing</text>
  <text x="268" y="172" font-family="monospace" font-size="10" fill="#484f58">drop-in replacement</text>

  <rect x="484" y="60" width="216" height="144" rx="8" fill="#1c2128" stroke="#a371f744" stroke-width="1"/>
  <text x="500" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#a371f7">PLATFORM SUPPORT</text>
  <text x="500" y="100" font-family="monospace" font-size="10" fill="#8b949e">macOS procwalk (sysctl)</text>
  <text x="500" y="116" font-family="monospace" font-size="10" fill="#8b949e">Linux procwalk (/proc)</text>
  <text x="500" y="132" font-family="monospace" font-size="10" fill="#8b949e">Build-tag isolation</text>
  <text x="500" y="152" font-family="monospace" font-size="10" fill="#8b949e">Claude Code metadata</text>
  <text x="500" y="172" font-family="monospace" font-size="10" fill="#484f58">_darwin.go / _linux.go</text>
</svg>
