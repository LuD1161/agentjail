version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/store/queries.sql"
    schema: "internal/store/schema.sql"
    gen:
      go:
        package: "store"
        out: "internal/store"
        emit_json_tags: true
        emit_empty_slices: true
        rename:
          session: "DBSession"
          decision: "DBDecision"
          audit_event: "DBAuditEvent"
