# policy-mcp-heavy.yaml — for teams that use many MCP servers and want
# per-tool granularity (Level 1 gating).
#
# Each entry in `mcp.servers.<name>.allowed_tools` is an explicit allowlist.
# Anything not listed is denied. Combine with samples/policies/*.rego for
# argument-level inspection.
#
# Install:
#   cp samples/configs/policy-mcp-heavy.yaml ~/.agentjail/policy.yaml
#   kill -HUP $(pgrep -f agentjail-daemon)

mcp:
  allowed:
    - "filesystem"
    - "fetch"
    - "github"
    - "memory"
    - "sequentialthinking"
    - "puppeteer"
    - "brave-search"
  blocked:
    - "*stripe*"
    - "*payment*"
    - "*billing*"
  servers:
    # Filesystem: read-only by default. Add write_file here if a project needs it.
    filesystem:
      allowed_tools:
        - "read_file"
        - "read_multiple_files"
        - "list_directory"
        - "directory_tree"
        - "search_files"
        - "get_file_info"

    # Fetch: only the fetch tool itself (no fetch_html, fetch_markdown variants).
    fetch:
      allowed_tools:
        - "fetch"

    # GitHub: read-only operations. Writes (create PR, merge, comment) are
    # blocked by allowed_tools, OR drop in samples/policies/mcp_github_writes_ask.rego
    # to escalate them to ask instead of deny.
    github:
      allowed_tools:
        - "search_repositories"
        - "get_file_contents"
        - "list_issues"
        - "get_issue"
        - "list_pull_requests"
        - "get_pull_request"
        - "list_commits"
        - "get_commit"

    # Memory and sequentialthinking: low risk; allow everything implicitly
    # by omitting an allowed_tools list.

    # Puppeteer: browser automation. Allow navigation and content extraction,
    # deny screenshots (privacy: don't accidentally capture your screen).
    puppeteer:
      allowed_tools:
        - "puppeteer_navigate"
        - "puppeteer_evaluate"
        - "puppeteer_click"
        - "puppeteer_fill"

    # Brave search: only the search tool, no local-machine queries.
    brave-search:
      allowed_tools:
        - "brave_web_search"

network:
  allowed_hosts:
    - "api.github.com"
    - "raw.githubusercontent.com"
    - "registry.npmjs.org"
    - "pypi.org"
    - "api.search.brave.com"

file:
  extra_deny: []
  extra_allow: []

commands:
  extra_block: []
