name: DCO

# Enforces the Developer Certificate of Origin: every non-merge commit in a PR
# must carry a "Signed-off-by: Name <email>" trailer (produced by `git commit -s`).
# See CONTRIBUTING.md for the full DCO text and remediation steps.
#
# This is a self-contained check — no third-party action and no GitHub App to
# install. Mark it a required status check in branch protection on `main` to
# block un-signed-off PRs from merging.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    name: Developer Certificate of Origin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: check sign-off on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          fail=0
          # Commits introduced by this PR, excluding merge commits.
          for sha in $(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}"); do
            short=$(git rev-parse --short "$sha")
            subject=$(git show -s --format='%s' "$sha")
            author=$(git show -s --format='%an <%ae>' "$sha")
            # Require a Signed-off-by trailer of the shape "Name <local@domain>".
            if git show -s --format='%B' "$sha" \
                 | grep -Eiq '^Signed-off-by: .+ <[^<>@[:space:]]+@[^<>[:space:]]+>[[:space:]]*$'; then
              echo "ok    ${short}  ${subject}"
            else
              echo "FAIL  ${short}  ${subject}  (author: ${author})"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "" >&2
            echo "One or more commits are missing a DCO sign-off trailer" >&2
            echo "(Signed-off-by: Your Name <you@example.com>)." >&2
            echo "" >&2
            echo "Fix the latest commit:   git commit --amend -s" >&2
            echo "Fix the whole branch:    git rebase --signoff origin/main" >&2
            echo "Then push:               git push --force-with-lease" >&2
            echo "" >&2
            echo "See CONTRIBUTING.md (Developer Certificate of Origin) for details." >&2
            exit 1
          fi
          echo "All commits signed off."
