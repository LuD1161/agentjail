<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agentjail ui — dev tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Cascadia Code', 'ui-monospace', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { background: #131720; color: #f0f3f6; }
    .action-allow  { color: #56d364; }
    .action-deny   { color: #ff7b72; font-weight: 700; }
    .action-ask    { color: #e3b341; }
    .action-other  { color: #9ca3af; }
    .rule-dot-on   { color: #56d364; }
    .rule-dot-off  { color: #545d68; }
    .session-row   { cursor: pointer; }
    .session-row:hover { background: #1c2333; }
    .session-active { background: #1c2333; border-left: 2px solid #58a6ff; }
    .event-row     { cursor: pointer; }
    .event-row:hover { background: #1c2333; }
    .timeline-grid {
      display: grid;
      grid-template-columns: var(--tl-cols, 76px 70px 64px minmax(100px,1fr) 120px 200px 120px);
      gap: 16px;
      align-items: center;
    }
    .timeline-header { user-select: none; }
    .timeline-header span { position: relative; }
    .col-resize-handle {
      position: absolute;
      right: -5px;
      top: 0;
      bottom: 0;
      width: 9px;
      cursor: col-resize;
      z-index: 2;
      border-left: 1px solid #3b4252;
    }
    .col-resize-handle:hover, .col-resize-handle.active { border-left-color: #58a6ff; background: rgba(88,166,255,0.12); }
    .pane-drag-h {
      width: 8px; flex: none; cursor: col-resize; position: relative; z-index: 5;
      background: #1a1f2e;
      border-left: 1px solid #3b4252; border-right: 1px solid #3b4252;
      transition: background 0.15s;
      background-image: url("data:image/svg+xml,%3Csvg width='2' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='%23545d68'/%3E%3Ccircle cx='1' cy='5' r='1' fill='%23545d68'/%3E%3C/svg%3E");
      background-repeat: repeat-y;
      background-position: center;
    }
    .pane-drag-h:hover, .pane-drag-h.active { background-color: #58a6ff; background-image: none; }
    .pane-drag-v {
      height: 8px; flex: none; cursor: row-resize; position: relative; z-index: 5;
      background: #1a1f2e;
      border-top: 1px solid #3b4252; border-bottom: 1px solid #3b4252;
      transition: background 0.15s;
      background-image: url("data:image/svg+xml,%3Csvg width='8' height='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='%23545d68'/%3E%3Ccircle cx='5' cy='1' r='1' fill='%23545d68'/%3E%3C/svg%3E");
      background-repeat: repeat-x;
      background-position: center;
    }
    .pane-drag-v:hover, .pane-drag-v.active { background-color: #58a6ff; background-image: none; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #131720; }
    ::-webkit-scrollbar-thumb { background: #3b4252; border-radius: 3px; }
    .badge { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-allow { background: #122d1f; color: #56d364; border: 1px solid #1f4d2e; }
    .badge-deny  { background: #351413; color: #ff7b72; border: 1px solid #6b2725; }
    .badge-ask   { background: #332200; color: #e3b341; border: 1px solid #4d3800; }
    .badge-core  { background: #0f1f3d; color: #58a6ff; border: 1px solid #1e3f6e; }
    .badge-lib   { background: #1f1530; color: #bc8cff; border: 1px solid #352555; }
    .badge-source { background: #1a1f2e; color: #9ca3af; border: 1px solid #3b4252; }
    .source-warning { color: #e3b341; }
    .filter-input { background:#131720; border:1px solid #3b4252; border-radius:4px; color:#d1d5db; padding:2px 6px; }
    .btn-sm { padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .btn-sm:hover { opacity: .85; }
    .btn-enable  { background: #122d1f; color: #56d364; border: 1px solid #1f4d2e; }
    .btn-disable { background: #351413; color: #ff7b72; border: 1px solid #6b2725; }
    .expand-details { background: #161b28; border: 1px solid #2a3040; border-radius: 4px; margin-top: 4px; padding: 8px 12px; font-size: 11px; color: #9ca3af; }
    .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #56d364; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
    .collapsible-header { cursor: pointer; user-select: none; }
    .collapsible-header:hover { background: #1c2333 !important; }
    .collapsible-header .chevron { transition: transform 0.2s; display: inline-block; }
    .collapsible-header.collapsed .chevron { transform: rotate(-90deg); }
  </style>
</head>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let sessions = {};        // id -> {id, agent, cwd, total, allow, deny, ask, first_seen, last_seen}
let lastEventTime = null;
let events = [];          // ring buffer of last 500 EvalLine objects
let selectedSession = null; // null = all
let expandedEventKey = null; // "req_id|time" identity key for expanded event
let rulesData = [];
let sessionEvents = {};   // id -> full replay events from /api/session
let auditEvents = [];
let sourceStatus = null;
let filters = {action:'', tool:'', rule:''};
let filterDebounceTimer = null;

const MAX_EVENTS = 500;

function buildFilterQuery() {
  const p = new URLSearchParams();
  if (filters.action) p.set('action', filters.action);
  if (filters.tool) p.set('tool', filters.tool);
  if (filters.rule) p.set('rule', filters.rule);
  return p.toString() ? '?' + p.toString() : '';
}

// ---------------------------------------------------------------------------
// Bootstrap: load initial state + rules
// ---------------------------------------------------------------------------
async function loadState() {
  try {
    const r = await fetch('/api/state' + buildFilterQuery());
    if (!r.ok) return;
    const data = await r.json();
    // Populate sessions
    for (const s of (data.sessions || [])) {
      sessions[s.id] = s;
    }
    events = (data.recent_events || []);
    sourceStatus = data.source || null;
    if (data.total_allow != null) {
      document.getElementById('n-allow').textContent = data.total_allow;
      document.getElementById('n-deny').textContent = data.total_deny;
      document.getElementById('n-ask').textContent = data.total_ask;
    }
    renderAll();
  } catch(e) { console.error('loadState', e); }
}

async function loadAudit() {
  try {
    const r = await fetch('/api/audit');
    if (!r.ok) {
      auditEvents = [];
    } else {
      const data = await r.json();
      auditEvents = data.events || [];
    }
    renderAudit();
  } catch(e) { console.error('loadAudit', e); }
}

async function loadRules() {
  try {
    const r = await fetch('/api/rules');
    if (!r.ok) return;
    rulesData = await r.json();
    renderRules();
  } catch(e) { console.error('loadRules', e); }
}

// ---------------------------------------------------------------------------
// SSE
// ---------------------------------------------------------------------------
function connectSSE() {
  const es = new EventSource('/events');
  es.onopen = () => {
    document.getElementById('conn-status').textContent = 'daemon connected';
    document.getElementById('live-dot').style.background = '#3fb950';
  };
  es.onerror = () => {
    document.getElementById('conn-status').textContent = 'reconnecting…';
    document.getElementById('live-dot').style.background = '#d29922';
  };
  es.onmessage = (e) => {
    try {
      const line = JSON.parse(e.data);
      ingestEvent(line);
    } catch(err) { console.error('sse parse', err); }
  };
}

function ingestEvent(line) {
  lastEventTime = Date.now();
  // Update session
  if (line.session_id) {
    if (!sessions[line.session_id]) {
      sessions[line.session_id] = {
        id: line.session_id,
        first_seen: line.time,
        last_seen: line.time,
        last_event: line.time,
        cwd: line.cwd || '',
        agent: line.agent || '',
        branch: line.branch || '',
        repo_name: line.repo_name || '',
        total: 0, allow: 0, deny: 0, ask: 0
      };
    }
    const s = sessions[line.session_id];
    s.last_seen = line.time;
    s.last_event = line.time;
    if (line.cwd) s.cwd = line.cwd;
    if (line.agent) s.agent = line.agent;
    s.total++;
    if (line.action === 'allow') s.allow++;
    else if (line.action === 'deny') s.deny++;
    else if (line.action === 'ask') s.ask++;
  }

  // Ring buffer
  if (events.length >= MAX_EVENTS) events.shift();
  events.push(line);

  renderSessions();
  renderTimeline();
  renderFilterOptions();
  updateCounters();
}

// ---------------------------------------------------------------------------
// Counters
// ---------------------------------------------------------------------------
function updateCounters() {
  let allow = 0, deny = 0, ask = 0;
  for (const s of Object.values(sessions)) {
    allow += s.allow; deny += s.deny; ask += s.ask;
  }
  document.getElementById('n-allow').textContent = allow;
  document.getElementById('n-deny').textContent = deny;
  document.getElementById('n-ask').textContent = ask;
}

// ---------------------------------------------------------------------------
// Render sessions sidebar
// ---------------------------------------------------------------------------
function agentIcon(agent) {
  const a = (agent || '').toLowerCase();
  const sz = 'width="18" height="18" style="flex-shrink:0"';

function sessionLabel(s, {includeAgent = false} = {}) {
  const agent = includeAgent ? (s.agent || '') : '';
  const repo = s.repo_name || cwdBasename(s.cwd);
  const branch = s.branch || '';
  const parts = [agent, branch, repo].filter(Boolean);
  if (parts.length) return parts.join(' · ');
  const name = s.id || '';
  if (name.length <= 20) return name;
  return name.substring(0, 18) + '…';
}

function relativeTime(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  if (diff < 0) return 'just now';
  const s = Math.floor(diff / 1000);
  if (s < 60) return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function cwdBasename(cwd) {
  if (!cwd) return '';
  // Return last path component
  return cwd.replace(/\\/g, '/').replace(/\/$/, '').split('/').pop() || cwd;
}

function renderSessionItem(s) {
  const label = sessionLabel(s);
  const active = selectedSession === s.id;
  const icon = agentIcon(s.agent);
  const timeAgo = s.last_event ? `<span class="text-gray-600">${relativeTime(s.last_event)}</span>` : '';
  const cwdDir = s.cwd ? `<div class="text-xs text-gray-600 truncate" title="${escHtml(s.cwd)}">&#128193; ${escHtml(cwdBasename(s.cwd))}</div>` : '';
  return `<div class="session-row px-3 py-2 ${active ? 'session-active' : ''}" onclick="selectSession('${s.id}')" title="${escHtml(s.agent || '')}">
    <div class="flex items-center gap-2 min-w-0">
      ${icon}
      <div class="min-w-0 flex-1">
        <div class="text-xs text-gray-300 font-semibold truncate" title="${escHtml(sessionLabel(s, {includeAgent: true}))}">${escHtml(label)}</div>
        <div class="text-xs text-gray-500">${s.total} events
          ${s.deny > 0 ? `<span class="text-red-400 font-bold"> · ${s.deny} deny</span>` : ''}
          ${timeAgo}
        </div>
        ${cwdDir}
      </div>
    </div>
  </div>`;
}

function renderSessions() {
  const list = document.getElementById('sessions-list');
  const now = Date.now();
  const ACTIVE_MS = 15 * 60 * 1000;
  const sorted = Object.values(sessions).sort((a, b) => {
    const ta = a.last_event ? new Date(a.last_event).getTime() : new Date(a.last_seen).getTime();
    const tb = b.last_event ? new Date(b.last_event).getTime() : new Date(b.last_seen).getTime();
    return tb - ta;
  });

  const activeSessions = sorted.filter(s => {
    const t = s.last_event ? new Date(s.last_event).getTime() : (s.last_seen ? new Date(s.last_seen).getTime() : 0);
    return t > 0 && (now - t) < ACTIVE_MS;
  });
  const inactiveSessions = sorted.filter(s => {
    const t = s.last_event ? new Date(s.last_event).getTime() : (s.last_seen ? new Date(s.last_seen).getTime() : 0);
    return t === 0 || (now - t) >= ACTIVE_MS;
  });

  let html = '';
  if (activeSessions.length > 0) {
    html += '<div class="px-3 py-1 text-xs font-semibold text-green-500 uppercase tracking-wider">Active</div>';
    html += activeSessions.map(renderSessionItem).join('');
  }
  if (inactiveSessions.length > 0) {
    html += `<div class="px-3 py-1 text-xs font-semibold text-gray-500 uppercase tracking-wider${activeSessions.length > 0 ? ' mt-1' : ''}">Recent</div>`;
    html += inactiveSessions.map(renderSessionItem).join('');
  }
  list.innerHTML = html;

  // Show/hide back button
  document.getElementById('session-back-row').classList.toggle('hidden', selectedSession === null);
}

async function selectSession(id) {
  selectedSession = id;
  expandedEventKey = null;

  // Update URL permalink
  const url = new URL(window.location);
  if (id) { url.searchParams.set('session', id); }
  else { url.searchParams.delete('session'); }
  history.pushState(null, '', url);

  renderSessions();
  renderTimeline();

  const lbl = document.getElementById('timeline-filter-label');
  lbl.textContent = id ? `· ${id.substring(0,12)}…` : '';
  document.getElementById('export-session').classList.toggle('hidden', !id);

  if (id && !sessionEvents[id]) {
    try {
      const fq = buildFilterQuery();
      const sep = fq ? '&' : '';
      const r = await fetch(`/api/session?id=${encodeURIComponent(id)}${sep}${fq.replace('?','')}`);
      if (r.ok) {
        const data = await r.json();
        sessionEvents[id] = data.events || [];
        renderTimeline();
      }
    } catch(e) { console.error('load session', e); }
  }
}

// ---------------------------------------------------------------------------
// Render timeline
// ---------------------------------------------------------------------------
function renderTimeline() {
  const container = document.getElementById('timeline');
  const scrollTop = container.scrollTop;
  const base = selectedSession
    ? (sessionEvents[selectedSession] || events.filter(e => e.session_id === selectedSession))
    : events;
  const visible = base.filter(ev =>
    (!filters.action || (ev.action || '').toLowerCase() === filters.action) &&
    (!filters.tool || (ev.tool || '') === filters.tool) &&
    (!filters.rule || (ev.rule_id || '').toLowerCase().includes(filters.rule))
  );

  if (visible.length === 0) {
    container.innerHTML = '<div class="px-4 py-6 text-xs text-gray-600">No events yet. Start an agent session and tool calls will stream here.</div>';
    return;
  }

  const header = `<div class="timeline-header px-5 py-2 sticky top-0 z-10" style="background:#1a2030;border-bottom:1px solid #30363d">
    <div class="timeline-grid" id="tl-header-grid">
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Time<div class="col-resize-handle" data-col="0"></div></span>
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Action<div class="col-resize-handle" data-col="1"></div></span>
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Tool<div class="col-resize-handle" data-col="2"></div></span>
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Summary<div class="col-resize-handle" data-col="3"></div></span>
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">CWD<div class="col-resize-handle" data-col="4"></div></span>
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Session<div class="col-resize-handle" data-col="5"></div></span>
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Rule</span>
    </div>
  </div>`;

  const rows = visible.map((ev, i) => {
    const t = ev.time ? new Date(ev.time).toLocaleTimeString(undefined, {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'}) : '—';
    const action = (ev.action || '').toLowerCase();
    const actionBadgeClass = action === 'allow' ? 'badge-allow' : action === 'deny' ? 'badge-deny' : action === 'ask' ? 'badge-ask' : '';
    const tool = ev.tool || '—';
    const summary = ev.summary || '';
    const evKey = (ev.req_id || '') + '|' + (ev.time || i);
    const expanded = expandedEventKey === evKey;

    const agentName = ev.agent || '';
    const sessIcon = agentName ? agentIcon(agentName).replace(/width="18"/,'width="12"').replace(/height="18"/,'height="12"') : '';
    const ruleShort = (ev.rule_id || '').split('/').pop() || '';
    const sessLabel = (() => {
      const sess = sessions[ev.session_id];
      if (sess) return sessionLabel(sess);
      const c = ev.cwd ? ev.cwd.replace(/\\/g, '/').replace(/\/$/, '').split('/').pop() : '';
      return c || ev.session_id || '';
    })();
    const sessTooltip = (() => {
      const sess = sessions[ev.session_id];
      if (sess) return sessionLabel(sess, {includeAgent: true});
      return sessLabel;
    })();

    return `<div class="event-row px-5 py-2" onclick="toggleExpand('${evKey}')">
      <div class="timeline-grid">
        <span class="text-gray-500">${t}</span>
        <span class="badge ${actionBadgeClass}" style="text-align:center">${(ev.action||'').toUpperCase()}</span>
        <span class="text-gray-300 truncate" title="${tool}">${tool}</span>
        <span class="text-gray-500 truncate">${escHtml(summary)}</span>
        <span class="text-gray-500 text-xs truncate" title="${escHtml(ev.cwd || '')}">${escHtml(ev.cwd ? ev.cwd.replace(/\\/g, '/').replace(/\/$/, '').split('/').pop() : '—')}</span>
        <span class="text-gray-500 text-xs flex items-center gap-1 overflow-hidden" title="${escHtml(sessTooltip)}">${sessIcon}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(sessLabel)}</span></span>
        <span class="text-gray-600 text-xs truncate" title="${ev.rule_id || ''}">${escHtml(ruleShort)}</span>
      </div>
      ${expanded ? `<div class="expand-details" style="margin-left:124px">
        ${ev.session_id ? `<div><span class="text-gray-600">session:</span> ${ev.session_id}</div>` : ''}
        ${ev.agent ? `<div><span class="text-gray-600">agent:</span> ${ev.agent}</div>` : ''}
        ${ev.rule_id ? `<div><span class="text-gray-600">rule:</span> ${ev.rule_id}</div>` : ''}
        ${ev.reason ? `<div><span class="text-gray-600">reason:</span> ${ev.reason}</div>` : ''}
        ${ev.impact ? `<div><span class="text-gray-600">impact:</span> <span class="text-red-400">${ev.impact}</span></div>` : ''}
        ${ev.summary ? `<div><span class="text-gray-600">command:</span> ${escHtml(ev.summary)}</div>` : ''}
        ${ev.tool_input_redacted ? `<div><span class="text-gray-600">tool_input:</span> <pre class="whitespace-pre-wrap text-gray-400 mt-1">${escHtml(ev.tool_input_redacted)}</pre></div>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');

  // Check if user was near bottom BEFORE replacing content.
  const wasAtBottom = scrollTop + container.clientHeight >= container.scrollHeight - 40;

  container.innerHTML = header + rows;

  // If user was at bottom, auto-scroll to new bottom; otherwise restore position.
  if (wasAtBottom) {
    container.scrollTop = container.scrollHeight;
  } else {
    container.scrollTop = scrollTop;
  }
}

function toggleExpand(key) {
  expandedEventKey = expandedEventKey === key ? null : key;
  renderTimeline();
}

function filtersChanged() {
  filters.action = document.getElementById('filter-action').value;
  filters.tool = document.getElementById('filter-tool').value;
  filters.rule = document.getElementById('filter-rule').value.trim().toLowerCase();
  expandedEventKey = null;
  renderTimeline();
  clearTimeout(filterDebounceTimer);
  filterDebounceTimer = setTimeout(() => {
    if (selectedSession) {
      delete sessionEvents[selectedSession];
      selectSession(selectedSession);
    } else {
      loadState();
    }
  }, 300);
}

function clearFilters() {
  document.getElementById('filter-action').value = '';
  document.getElementById('filter-tool').value = '';
  document.getElementById('filter-rule').value = '';
  filters = {action:'', tool:'', rule:''};
  renderTimeline();
  if (selectedSession) {
    delete sessionEvents[selectedSession];
    selectSession(selectedSession);
  } else {
    loadState();
  }
}

function renderFilterOptions() {
  const select = document.getElementById('filter-tool');
  const selected = select.value;
  const tools = [...new Set(events.map(e => e.tool).filter(Boolean))].sort();
  select.innerHTML = '<option value="">all tools</option>' +
    tools.map(tool => `<option value="${escHtml(tool)}">${escHtml(tool)}</option>`).join('');
  if (tools.includes(selected)) select.value = selected;
}

function exportSession() {
  if (!selectedSession) return;
  window.location.href = `/api/session?id=${encodeURIComponent(selectedSession)}&download=1`;
}

// ---------------------------------------------------------------------------
// Render rules table
// ---------------------------------------------------------------------------
function renderRules() {
  const container = document.getElementById('rules-table');
  if (!rulesData || rulesData.length === 0) {
    container.innerHTML = '<div class="text-xs text-gray-600 px-2 py-2">No rules loaded.</div>';
    return;
  }

  container.innerHTML = rulesData.map(rule => {
    const dot = rule.enabled ? '<span class="rule-dot-on">&#9679;</span>' : '<span class="rule-dot-off">&#9675;</span>';
    const srcBadge = rule.source === 'core' ? '<span class="badge badge-core">core</span>' : '<span class="badge badge-lib">library</span>';
    const status = rule.enabled ? '<span class="text-green-400 text-xs">enabled</span>' : '<span class="text-gray-600 text-xs">disabled</span>';

    let btn = '';
    if (rule.source === 'library' && rule.editable) {
      if (rule.enabled) {
        btn = `<button class="btn-sm btn-disable ml-2" onclick="policyDisable('${rule.name}', this)">disable</button>`;
      } else {
        btn = `<button class="btn-sm btn-enable ml-2" onclick="policyEnable('${rule.name}', this)">enable</button>`;
      }
    }

    return `<div class="flex items-center gap-2 py-1 px-2 hover:bg-gray-900 rounded">
      <span class="flex-none">${dot}</span>
      <span class="flex-none text-gray-300" style="width:220px;overflow:hidden;text-overflow:ellipsis">${rule.name}</span>
      <span class="flex-none">${srcBadge}</span>
      <span class="flex-none">${status}</span>
      <span>${btn}</span>
      ${rule.source === 'library' && !rule.editable ? '<span class="text-gray-600 text-xs">read-only</span>' : ''}
    </div>`;
  }).join('');
}

function renderAudit() {
  const container = document.getElementById('audit-table');
  const badge = document.getElementById('audit-count-badge');
  if (badge) badge.textContent = auditEvents.length ? `(${auditEvents.length})` : '';
  if (!auditEvents.length) {
    container.innerHTML = '<div class="text-xs text-gray-600 px-2 py-2">No audit events.</div>';
    return;
  }
  container.innerHTML = auditEvents.map(ev => {
    const t = ev.time ? new Date(ev.time).toLocaleString() : '—';
    return `<div class="grid grid-cols-4 gap-3 py-1 px-2 hover:bg-gray-900 rounded text-xs">
      <span class="text-gray-500">${escHtml(t)}</span>
      <span class="text-yellow-400">${escHtml(ev.action || '—')}</span>
      <span class="text-gray-300 truncate" title="${escHtml(ev.rule_id || '')}">${escHtml(ev.rule_id || '—')}</span>
      <span class="text-gray-500">${escHtml(ev.user || '—')}</span>
    </div>`;
  }).join('');
}

async function policyEnable(name, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const r = await fetch(`/api/policy/enable?name=${encodeURIComponent(name)}`, {method:'POST'});
    const data = await r.json();
    if (data.error) { alert('Error: ' + data.error); btn.disabled = false; btn.textContent = 'enable'; return; }
    // Optimistic update
    const rule = rulesData.find(x => x.name === name);
    if (rule) rule.enabled = true;
    renderRules();
  } catch(e) { btn.disabled = false; btn.textContent = 'enable'; }
}

async function policyDisable(name, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const r = await fetch(`/api/policy/disable?name=${encodeURIComponent(name)}`, {method:'POST'});
    const data = await r.json();
    if (data.error) { alert('Error: ' + data.error); btn.disabled = false; btn.textContent = 'disable'; return; }
    const rule = rulesData.find(x => x.name === name);
    if (rule) rule.enabled = false;
    renderRules();
  } catch(e) { btn.disabled = false; btn.textContent = 'disable'; }
}

// Pane resize drag logic
document.addEventListener('mousedown', e => {
  const drag = e.target.closest('.pane-drag-h, .pane-drag-v');
  if (!drag) return;
  e.preventDefault();
  const isH = drag.classList.contains('pane-drag-h');
  const pane = drag.dataset.pane;
  drag.classList.add('active');
  document.body.style.cursor = isH ? 'col-resize' : 'row-resize';
  document.body.style.userSelect = 'none';

  let target;
  if (pane === 'sidebar') target = document.getElementById('sidebar-pane');
  else if (pane === 'audit') target = document.getElementById('audit-pane');
  else if (pane === 'rules') target = document.getElementById('rules-pane');
  if (!target) return;

  const startPos = isH ? e.clientX : e.clientY;
  const startSize = isH ? target.offsetWidth : target.offsetHeight;
  const grows = pane === 'sidebar';

  const onMove = ev => {
    const delta = (isH ? ev.clientX : ev.clientY) - startPos;
    const newSize = Math.max(80, startSize + (grows ? delta : -delta));
    if (isH) target.style.width = newSize + 'px';
    else target.style.height = newSize + 'px';
  };
  const onUp = () => {
    drag.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

// Column resize drag logic
let tlColWidths = [76, 70, 64, null, 120, 200, 120]; // null = flex (1fr) = Summaryle fills remaining
function applyColWidths() {
  const cols = tlColWidths.map(w => w == null ? '1fr' : w + 'px').join(' ');
  document.documentElement.style.setProperty('--tl-cols', cols);
}
document.addEventListener('mousedown', e => {
  const handle = e.target.closest('.col-resize-handle');
  if (!handle) return;
  e.preventDefault();
  const col = parseInt(handle.dataset.col);
  const startX = e.clientX;
  const headerGrid = document.getElementById('tl-header-grid');
  if (!headerGrid) return;
  const cells = headerGrid.children;
  const startW = cells[col].getBoundingClientRect().width;
  handle.classList.add('active');
  const onMove = ev => {
    const newW = Math.max(30, startW + ev.clientX - startX);
    tlColWidths[col] = Math.round(newW);
    applyColWidths();
  };
  const onUp = () => {
    handle.classList.remove('active');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleAuditPane() {
  const header = document.querySelector('#audit-pane .collapsible-header');
  const table = document.getElementById('audit-table');
  header.classList.toggle('collapsed');
  table.style.display = header.classList.contains('collapsed') ? 'none' : 'block';
}

function renderAll() {
  renderSessions();
  renderTimeline();
  renderFilterOptions();
  renderSource();
  updateCounters();
}

function renderSource() {
  if (!sourceStatus) return;
  const badge = document.getElementById('source-badge');
  const warning = document.getElementById('source-warning');
  badge.textContent = `source: ${sourceStatus.kind} · ${sourceStatus.path || 'unknown'}`;
  badge.title = sourceStatus.live_path ? `snapshot: ${sourceStatus.path}\nlive: ${sourceStatus.live_path}` : (sourceStatus.path || '');
  warning.textContent = sourceStatus.warning || '';
  warning.classList.toggle('hidden', !sourceStatus.warning);
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
// Restore session from URL permalink (?session=ID)
const urlSession = new URLSearchParams(window.location.search).get('session');
if (urlSession) selectedSession = urlSession;

loadState().then(() => {
  if (urlSession) selectSession(urlSession);
});
loadRules();
loadAudit();
connectSSE();

// Handle browser back/forward
window.addEventListener('popstate', () => {
  const s = new URLSearchParams(window.location.search).get('session');
  selectSession(s || null);
});
setInterval(() => {
  const el = document.getElementById('last-event-ago');
  if (!el) return;
  if (!lastEventTime) { el.textContent = ''; return; }
  const ago = Math.floor((Date.now() - lastEventTime) / 1000);
  if (ago < 2) el.textContent = 'last event: just now';
  else el.textContent = `last event: ${ago}s ago`;
}, 1000);
</script>
