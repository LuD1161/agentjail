<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agentjail ui — dev tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Cascadia Code', 'ui-monospace', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0d1117; color: #e6edf3; }
    .action-allow  { color: #3fb950; }
    .action-deny   { color: #f85149; font-weight: 700; }
    .action-ask    { color: #d29922; }
    .action-other  { color: #8b949e; }
    .rule-dot-on   { color: #3fb950; }
    .rule-dot-off  { color: #484f58; }
    .session-row   { cursor: pointer; }
    .session-row:hover { background: #161b22; }
    .session-active { background: #161b22; border-left: 2px solid #388bfd; }
    .event-row     { cursor: pointer; }
    .event-row:hover { background: #161b22; }
    .timeline-grid {
      display: grid;
      grid-template-columns: var(--tl-cols, 64px 52px 120px 1fr 70px);
      gap: 8px;
      align-items: center;
    }
    .timeline-header { user-select: none; }
    .timeline-header span {
      position: relative;
      padding-right: 6px;
    }
    .col-resize-handle {
      position: absolute;
      right: -4px;
      top: 0;
      bottom: 0;
      width: 8px;
      cursor: col-resize;
      z-index: 1;
    }
    .col-resize-handle:hover, .col-resize-handle.active { background: #3b82f6; opacity: 0.4; border-radius: 2px; }
    .pane-drag-h {
      width: 8px; flex: none; cursor: col-resize; position: relative; z-index: 5;
      background: #1c2128;
      border-left: 1px solid #30363d; border-right: 1px solid #30363d;
      transition: background 0.15s;
      background-image: url("data:image/svg+xml,%3Csvg width='2' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='%23484f58'/%3E%3Ccircle cx='1' cy='5' r='1' fill='%23484f58'/%3E%3C/svg%3E");
      background-repeat: repeat-y;
      background-position: center;
    }
    .pane-drag-h:hover, .pane-drag-h.active { background-color: #3b82f6; background-image: none; }
    .pane-drag-v {
      height: 8px; flex: none; cursor: row-resize; position: relative; z-index: 5;
      background: #1c2128;
      border-top: 1px solid #30363d; border-bottom: 1px solid #30363d;
      transition: background 0.15s;
      background-image: url("data:image/svg+xml,%3Csvg width='8' height='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='%23484f58'/%3E%3Ccircle cx='5' cy='1' r='1' fill='%23484f58'/%3E%3C/svg%3E");
      background-repeat: repeat-x;
      background-position: center;
    }
    .pane-drag-v:hover, .pane-drag-v.active { background-color: #3b82f6; background-image: none; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .badge { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-allow { background: #0d2316; color: #3fb950; border: 1px solid #1a4127; }
    .badge-deny  { background: #2d0f0e; color: #f85149; border: 1px solid #5a1d1d; }
    .badge-ask   { background: #2a1d00; color: #d29922; border: 1px solid #3d2b00; }
    .badge-core  { background: #0d1b2e; color: #388bfd; border: 1px solid #1a3859; }
    .badge-lib   { background: #1a1225; color: #a371f7; border: 1px solid #2d1f45; }
    .badge-source { background: #161b22; color: #8b949e; border: 1px solid #30363d; }
    .source-warning { color: #d29922; }
    .filter-input { background:#0d1117; border:1px solid #30363d; border-radius:4px; color:#c9d1d9; padding:2px 6px; }
    .btn-sm { padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .btn-sm:hover { opacity: .85; }
    .btn-enable  { background: #0d2316; color: #3fb950; border: 1px solid #1a4127; }
    .btn-disable { background: #2d0f0e; color: #f85149; border: 1px solid #5a1d1d; }
    .expand-details { background: #0d1117; border: 1px solid #21262d; border-radius: 4px; margin-top: 4px; padding: 8px 12px; font-size: 11px; color: #8b949e; }
    .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #3fb950; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
  </style>
</head>
<body class="font-mono text-sm h-screen flex flex-col overflow-hidden">

<!-- Top bar -->
<header class="border-b border-gray-800 px-4 py-2 flex-none">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="font-bold text-white text-base">agentjail ui</span>
      <span class="live-dot" id="live-dot" title="connected"></span>
      <span class="text-xs text-gray-500" id="conn-status">connecting…</span>
      <span class="badge badge-source" id="source-badge">source: loading…</span>
      <span class="text-xs source-warning hidden" id="source-warning"></span>
      <span class="text-xs text-gray-600">|</span>
      <span class="text-xs" id="count-allow"><span class="text-green-400 font-bold" id="n-allow">0</span> <span class="text-gray-500">allow</span></span>
      <span class="text-xs" id="count-deny"><span class="text-red-400 font-bold" id="n-deny">0</span> <span class="text-gray-500">deny</span></span>
      <span class="text-xs" id="count-ask"><span class="text-yellow-400 font-bold" id="n-ask">0</span> <span class="text-gray-500">ask</span></span>
    </div>
    <div class="text-xs text-yellow-600 font-semibold">&#9888; local dev tool — NOT in v0.1.0-alpha release</div>
  </div>
</header>

<!-- Main layout: sessions | timeline -->
<div class="flex flex-1 overflow-hidden">

  <!-- Sidebar: sessions -->
  <aside id="sidebar-pane" style="width:208px;flex:none" class="border-r border-gray-800 flex flex-col overflow-hidden">
    <div class="px-3 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-800">Sessions</div>
    <div class="overflow-y-auto flex-1" id="sessions-list">
      <!-- sessions injected by JS -->
    </div>
    <div class="border-t border-gray-800 session-row px-3 py-2 text-xs text-gray-400"
         id="session-all-row" onclick="selectSession(null)">
      &#9654; all sessions
    </div>
  </aside>

  <div class="pane-drag-h" data-pane="sidebar"></div>

  <!-- Right side: timeline + audit + rules -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Timeline -->
    <main id="timeline-pane" class="flex-1 flex flex-col overflow-hidden" style="min-height:100px">
      <div class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-800 flex items-center gap-2">
        <span>Timeline</span>
        <span class="text-gray-600 text-xs font-normal" id="timeline-filter-label"></span>
        <span class="flex-1"></span>
        <select id="filter-action" class="filter-input normal-case" onchange="filtersChanged()">
          <option value="">all actions</option>
          <option value="allow">allow</option>
          <option value="deny">deny</option>
          <option value="ask">ask</option>
        </select>
        <select id="filter-tool" class="filter-input normal-case" onchange="filtersChanged()">
          <option value="">all tools</option>
        </select>
        <input id="filter-rule" class="filter-input normal-case" placeholder="rule contains…" oninput="filtersChanged()">
        <button class="btn-sm border border-gray-700 normal-case text-gray-400" onclick="clearFilters()">clear</button>
        <button id="export-session" class="btn-sm border border-blue-900 normal-case text-blue-400 hidden" onclick="exportSession()">export session</button>
      </div>
      <div class="overflow-y-auto flex-1" id="timeline">
        <!-- events injected by JS -->
      </div>
    </main>

    <div class="pane-drag-v" data-pane="audit"></div>

    <!-- Audit events -->
    <section id="audit-pane" style="height:150px;flex:none;overflow-y:auto;min-height:40px">
      <div class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-800 sticky top-0 z-10 flex items-center" style="background:#0d1117;">
        <span>Audit events</span>
        <span class="flex-1"></span>
        <span class="text-gray-600 normal-case font-normal">policy and MCP mutations</span>
      </div>
      <div id="audit-table" class="px-2 py-1"></div>
    </section>

    <div class="pane-drag-v" data-pane="rules"></div>

    <!-- Rules section -->
    <section id="rules-pane" style="height:220px;flex:none;overflow-y:auto;min-height:40px">
      <div class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-800 sticky top-0 z-10" style="background:#0d1117;">Rules</div>
      <div id="rules-table" class="px-2 py-1">
        <!-- rules injected by JS -->
      </div>
    </section>

  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let sessions = {};        // id -> {id, agent, cwd, total, allow, deny, ask, first_seen, last_seen}
let events = [];          // ring buffer of last 500 EvalLine objects
let selectedSession = null; // null = all
let expandedEventIdx = null;
let rulesData = [];
let sessionEvents = {};   // id -> full replay events from /api/session
let auditEvents = [];
let sourceStatus = null;
let filters = {action:'', tool:'', rule:''};
let filterDebounceTimer = null;

const MAX_EVENTS = 500;

function buildFilterQuery() {
  const p = new URLSearchParams();
  if (filters.action) p.set('action', filters.action);
  if (filters.tool) p.set('tool', filters.tool);
  if (filters.rule) p.set('rule', filters.rule);
  return p.toString() ? '?' + p.toString() : '';
}

// ---------------------------------------------------------------------------
// Bootstrap: load initial state + rules
// ---------------------------------------------------------------------------
async function loadState() {
  try {
    const r = await fetch('/api/state' + buildFilterQuery());
    if (!r.ok) return;
    const data = await r.json();
    // Populate sessions
    for (const s of (data.sessions || [])) {
      sessions[s.id] = s;
    }
    // Populate events
    events = (data.recent_events || []);
    sourceStatus = data.source || null;
    renderAll();
  } catch(e) { console.error('loadState', e); }
}

async function loadAudit() {
  try {
    const r = await fetch('/api/audit');
    if (!r.ok) {
      auditEvents = [];
    } else {
      const data = await r.json();
      auditEvents = data.events || [];
    }
    renderAudit();
  } catch(e) { console.error('loadAudit', e); }
}

async function loadRules() {
  try {
    const r = await fetch('/api/rules');
    if (!r.ok) return;
    rulesData = await r.json();
    renderRules();
  } catch(e) { console.error('loadRules', e); }
}

// ---------------------------------------------------------------------------
// SSE
// ---------------------------------------------------------------------------
function connectSSE() {
  const es = new EventSource('/events');
  es.onopen = () => {
    document.getElementById('conn-status').textContent = 'daemon connected';
    document.getElementById('live-dot').style.background = '#3fb950';
  };
  es.onerror = () => {
    document.getElementById('conn-status').textContent = 'reconnecting…';
    document.getElementById('live-dot').style.background = '#d29922';
  };
  es.onmessage = (e) => {
    try {
      const line = JSON.parse(e.data);
      ingestEvent(line);
    } catch(err) { console.error('sse parse', err); }
  };
}

function ingestEvent(line) {
  // Update session
  if (line.session_id) {
    if (!sessions[line.session_id]) {
      sessions[line.session_id] = {
        id: line.session_id,
        first_seen: line.time,
        last_seen: line.time,
        total: 0, allow: 0, deny: 0, ask: 0
      };
    }
    const s = sessions[line.session_id];
    s.last_seen = line.time;
    s.total++;
    if (line.action === 'allow') s.allow++;
    else if (line.action === 'deny') s.deny++;
    else if (line.action === 'ask') s.ask++;
  }

  // Ring buffer
  if (events.length >= MAX_EVENTS) events.shift();
  events.push(line);

  renderSessions();
  renderTimeline();
  renderFilterOptions();
  updateCounters();
}

// ---------------------------------------------------------------------------
// Counters
// ---------------------------------------------------------------------------
function updateCounters() {
  let allow = 0, deny = 0, ask = 0;
  for (const s of Object.values(sessions)) {
    allow += s.allow; deny += s.deny; ask += s.ask;
  }
  document.getElementById('n-allow').textContent = allow;
  document.getElementById('n-deny').textContent = deny;
  document.getElementById('n-ask').textContent = ask;
}

// ---------------------------------------------------------------------------
// Render sessions sidebar
// ---------------------------------------------------------------------------
function agentIcon(agent) {
  const a = (agent || '').toLowerCase();
  const sz = 'width="18" height="18" style="flex-shrink:0"';
  if (a.includes('claude'))  return `<svg ${sz} viewBox="0 0 248 248" fill="none"><path d="M52.4 162.9l46.4-26 .7-2.3-.7-1.3h-2.3l-7.8-.5-26.5-.7-22.9-.9-22.3-1.2-5.6-1.2L6.2 121.9l.5-3.4 4.7-3.2 6.8.6 14.9 1.1 22.4 1.5 16.2 1 24.1 2.5h3.8l.5-1.5-1.3-1-.9-.9-23.2-15.7-25.1-16.5-13.1-9.6-7-4.8-3.6-4.5-1.5-9.9 6.4-7.1 8.7.6 2.2.6 8.8 6.7 18.7 14.5 24.5 18 3.6 2.9 1.4-1 .2-.7-1.7-2.7-13.2-24-14.1-24.5-6.4-10.2-1.7-6 .5-7.2L67.8 7.5l4.1-1.3 9.8 1.3 4.1 3.5 6.1 13.9 9.8 21.9 15.3 29.8 4.5 8.9 2.4 8.1.9 2.5h1.5v-1.4l1.3-16.8 2.3-20.6 2.3-26.5.8-7.4 3.7-9 7.4-4.8 5.7 2.7 4.7 6.7-.6 4.4-2.8 18.2-5.5 28.5-3.6 19.1h2l2.4-2.5 9.7-12.8 16.2-20.3 7.1-8 8.4-8.9 5.4-4.3h10.2l7.4 11.1-3.3 11.5-10.4 13.2-8.7 11.2-12.4 16.6-7.7 13.4.7 1.1 1.9-.2 28-6-14.8-2.7 18.1-3.1 8.1 3.8.9 3.9-3.3 7.9-19.4 4.7-22.7 4.6-33.8 8L161.7 131.9l.4.7 15.2 1.4 6.5.4h15.9l29.7 2.2 7.8 5.1 4.6 6.3-.8 4.8-12 6-16-3.8-37.6-9-12.9-3.2h-1.8v1.1l10.7 10.5 19.7 17.7 24.6 22.9 1.3 5.7-3.2 4.5-3.3-.5-21.7-16.3-8.4-7.3-18.8-16h-1.3v1.7l4.3 6.4 23.1 34.6 1.1 10.6-1.7 3.4-6 2.1-6.5-1.2-13.6-19-13.9-21.3-11.2-19.1-1.4.9-6.7 71.2-3.1 3.7-7.1 2.7-6-4.5-3.2-7.3 3.2-14.5 3.8-18.9 3.1-15 2.8-18.7 1.7-6.2-.2-.4-1.4.2-14.1 19.3-21.5 24.7-17.3 18.1-4.1 1.7-7 -3.7-.6-6.5 3.9-5.8 23.4-29.8 14.1-18.5 9.1-10.6-.1-1.5-.5 0-62.3 40.6-11.1 1.4-4.8-4.5.6-6.5 2.3-2.4 18.7-12.9z" fill="#D97757"/></svg>`;
  if (a.includes('cursor'))  return `<svg ${sz} viewBox="96 73 321 366" fill="none"><path d="M410.3 159.5l-146.4-84.5c-4.7-2.7-10.5-2.7-15.2 0L102.4 159.5c-4 2.3-6.4 6.5-6.4 11.1v170.4c0 4.6 2.4 8.8 6.4 11.1l146.4 84.5c4.7 2.7 10.5 2.7 15.2 0l146.4-84.5c4-2.3 6.4-6.5 6.4-11.1V170.6c0-4.6-2.4-8.8-6.4-11.1zm-9.2 17.9L259.8 422c-1 1.6-3.5 1-3.5-.9V260.8c0-3.2-1.7-6.2-4.5-7.8L113 172.9c-1.6-1-.9-3.5.9-3.5h282.6c4 0 6.5 4.4 4.5 7.8z" fill="#edecec"/></svg>`;
  if (a.includes('codex'))   return `<svg ${sz} viewBox="0 0 64 64" fill="none"><path fill="#edecec" d="M42.7 36.5c1.2 0 2.1 1 2.1 2.1 0 1.2-1 2.1-2.1 2.1h-8c-1.2 0-2.1-1-2.1-2.1 0-1.2 1-2.1 2.1-2.1h8z"/><path fill="#edecec" d="M21.6 23.5c1-.6 2.3-.3 2.9.7l4 6.7c.4.7.4 1.5 0 2.1l-4 6.7c-.6 1-1.9 1.3-2.9.7-1-.6-1.3-1.9-.7-2.9L24.2 32l-3.4-5.6c-.6-1-.3-2.3.7-2.9z"/><path fill="#edecec" fill-rule="evenodd" d="M28.8 5.6c3.6 0 6.8 1.3 9.4 3.4.8-.1 1.7-.2 2.6-.2 8 0 14.5 6.5 14.5 14.5 0 .9-.1 1.7-.2 2.6 2.1 2.5 3.4 5.8 3.4 9.3 0 6.3-4 11.6-9.6 13.6-2 5.6-7.3 9.6-13.6 9.6-3.6 0-6.8-1.3-9.4-3.4-.8.2-1.7.2-2.6.2-8 0-14.5-6.5-14.5-14.5 0-.9.1-1.7.2-2.6-2-2.3-3.3-5.3-3.4-8.6l0-1.3c0-6.3 4-11.6 9.6-13.6 2-5.6 7.3-9.6 13.6-9.6zm0 4.3c-4.7 0-8.7 3.2-9.9 7.6-.2.7-.8 1.3-1.5 1.5-4.4 1.2-7.6 5.2-7.6 9.9 0 2.8 1.1 5.4 3 7.2.5.5.7 1.3.5 2-.2.8-.4 1.7-.4 2.6 0 5.6 4.6 10.2 10.2 10.2.9 0 1.8-.1 2.7-.4l.3-.1c.6-.1 1.3.1 1.8.6 1.9 1.9 4.4 3 7.3 3 4.7 0 8.7-3.2 9.9-7.6l.1-.3c.2-.6.8-1.1 1.4-1.3 4.4-1.2 7.6-5.2 7.6-9.9 0-2.8-1.1-5.4-3-7.2-.5-.5-.7-1.3-.6-2 .2-.8.4-1.7.4-2.6 0-5.6-4.6-10.2-10.2-10.2-.9 0-1.8.1-2.7.3-.7.2-1.5 0-2-.5-1.7-1.7-4.1-2.9-6.7-3h-.5z"/></svg>`;
  if (a.includes('opencode')) return `<svg ${sz} viewBox="0 0 240 300" fill="none"><path d="M180 240H60V120h120v120z" fill="#CFCECD"/><path d="M180 60H60v180h120V60zM240 300H0V0h240v300z" fill="#edecec"/></svg>`;
  if (a === 'try')           return `<svg ${sz} viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#6b7280" stroke-width="1.5" fill="#6b728022"/><text x="8" y="11.5" text-anchor="middle" fill="#6b7280" font-size="9" font-weight="bold" font-family="monospace">?</text></svg>`;
  return `<svg ${sz} viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#4b5563" stroke-width="1.5" fill="#4b556322"/><text x="8" y="11.5" text-anchor="middle" fill="#4b5563" font-size="9" font-weight="bold" font-family="monospace">A</text></svg>`;
}

function sessionLabel(s) {
  const name = s.id || '';
  if (name.length <= 20) return name;
  return name.substring(0, 18) + '…';
}

function renderSessions() {
  const list = document.getElementById('sessions-list');
  const sorted = Object.values(sessions).sort((a,b) =>
    new Date(b.last_seen) - new Date(a.last_seen));

  list.innerHTML = sorted.map(s => {
    const label = sessionLabel(s);
    const active = selectedSession === s.id;
    const icon = agentIcon(s.agent);
    const agentName = s.agent ? `<span class="text-gray-600">${s.agent}</span>` : '';
    return `<div class="session-row px-3 py-2 ${active ? 'session-active' : ''}" onclick="selectSession('${s.id}')">
      <div class="flex items-center gap-2 min-w-0">
        ${icon}
        <div class="min-w-0 flex-1">
          <div class="text-xs text-gray-300 font-semibold truncate" title="${s.id}">${escHtml(label)}</div>
          <div class="text-xs text-gray-500">${s.total} events
            ${s.deny > 0 ? `<span class="text-red-400 font-bold"> · ${s.deny} deny</span>` : ''}
            ${agentName}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Highlight "all sessions" row
  const allRow = document.getElementById('session-all-row');
  allRow.className = 'border-t border-gray-800 session-row px-3 py-2 text-xs text-gray-400' +
    (selectedSession === null ? ' session-active' : '');
}

async function selectSession(id) {
  selectedSession = id;
  expandedEventIdx = null;
  renderSessions();
  renderTimeline();

  const lbl = document.getElementById('timeline-filter-label');
  lbl.textContent = id ? `· ${id.substring(0,12)}…` : '';
  document.getElementById('export-session').classList.toggle('hidden', !id);

  if (id && !sessionEvents[id]) {
    try {
      const fq = buildFilterQuery();
      const sep = fq ? '&' : '';
      const r = await fetch(`/api/session?id=${encodeURIComponent(id)}${sep}${fq.replace('?','')}`);
      if (r.ok) {
        const data = await r.json();
        sessionEvents[id] = data.events || [];
        renderTimeline();
      }
    } catch(e) { console.error('load session', e); }
  }
}

// ---------------------------------------------------------------------------
// Render timeline
// ---------------------------------------------------------------------------
function renderTimeline() {
  const container = document.getElementById('timeline');
  const base = selectedSession
    ? (sessionEvents[selectedSession] || events.filter(e => e.session_id === selectedSession))
    : events;
  const visible = base.filter(ev =>
    (!filters.action || (ev.action || '').toLowerCase() === filters.action) &&
    (!filters.tool || (ev.tool || '') === filters.tool) &&
    (!filters.rule || (ev.rule_id || '').toLowerCase().includes(filters.rule))
  );

  if (visible.length === 0) {
    container.innerHTML = '<div class="px-4 py-6 text-xs text-gray-600">No events yet. Start an agent session and tool calls will stream here.</div>';
    return;
  }

  const header = `<div class="timeline-header px-4 py-1 sticky top-0 z-10" style="background:#161b22;border-bottom:1px solid #30363d">
    <div class="timeline-grid" id="tl-header-grid">
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Time<div class="col-resize-handle" data-col="0"></div></span>
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Action<div class="col-resize-handle" data-col="1"></div></span>
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Tool<div class="col-resize-handle" data-col="2"></div></span>
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Summary<div class="col-resize-handle" data-col="3"></div></span>
      <span class="text-gray-500 text-xs font-semibold uppercase tracking-wide">Session</span>
    </div>
  </div>`;

  const rows = visible.map((ev, i) => {
    const t = ev.time ? new Date(ev.time).toLocaleTimeString('en-US', {hour12:false}) : '—';
    const action = (ev.action || '').toLowerCase();
    const actionBadgeClass = action === 'allow' ? 'badge-allow' : action === 'deny' ? 'badge-deny' : action === 'ask' ? 'badge-ask' : '';
    const tool = ev.tool || '—';
    const summary = ev.summary || '';
    const sessionShort = ev.session_id ? ev.session_id.substring(0,8) : '';
    const expanded = expandedEventIdx === i;

    let details = '';
    if (expanded) {
      details = `<div class="expand-details ml-8">
        ${ev.session_id ? `<div><span class="text-gray-600">session:</span> ${ev.session_id}</div>` : ''}
        ${ev.rule_id ? `<div><span class="text-gray-600">rule:</span> ${ev.rule_id}</div>` : ''}
        ${ev.reason ? `<div><span class="text-gray-600">reason:</span> ${ev.reason}</div>` : ''}
        ${ev.impact ? `<div><span class="text-gray-600">impact:</span> <span class="text-red-400">${ev.impact}</span></div>` : ''}
        ${ev.summary ? `<div><span class="text-gray-600">command:</span> ${escHtml(ev.summary)}</div>` : ''}
        ${ev.tool_input_redacted ? `<div><span class="text-gray-600">tool_input:</span> <pre class="whitespace-pre-wrap text-gray-400 mt-1">${escHtml(ev.tool_input_redacted)}</pre></div>` : ''}
      </div>`;
    }

    return `<div class="event-row px-4 py-1" onclick="toggleExpand(${i})">
      <div class="timeline-grid">
        <span class="text-gray-500">${t}</span>
        <span class="badge ${actionBadgeClass}" style="text-align:center">${(ev.action||'').toUpperCase()}</span>
        <span class="text-gray-300 truncate" title="${tool}">${tool}</span>
        <span class="text-gray-500 truncate">${escHtml(summary)}</span>
        ${sessionShort ? `<span class="text-gray-700 text-xs">${sessionShort}</span>` : '<span></span>'}
      </div>
      ${details}
    </div>`;
  }).join('');

  container.innerHTML = header + rows;

  // Auto-scroll to bottom if near bottom already.
  const atBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 40;
  if (atBottom) container.scrollTop = container.scrollHeight;
}

function toggleExpand(idx) {
  expandedEventIdx = expandedEventIdx === idx ? null : idx;
  renderTimeline();
}

function filtersChanged() {
  filters.action = document.getElementById('filter-action').value;
  filters.tool = document.getElementById('filter-tool').value;
  filters.rule = document.getElementById('filter-rule').value.trim().toLowerCase();
  expandedEventIdx = null;
  renderTimeline();
  clearTimeout(filterDebounceTimer);
  filterDebounceTimer = setTimeout(() => {
    if (selectedSession) {
      delete sessionEvents[selectedSession];
      selectSession(selectedSession);
    } else {
      loadState();
    }
  }, 300);
}

function clearFilters() {
  document.getElementById('filter-action').value = '';
  document.getElementById('filter-tool').value = '';
  document.getElementById('filter-rule').value = '';
  filters = {action:'', tool:'', rule:''};
  renderTimeline();
  if (selectedSession) {
    delete sessionEvents[selectedSession];
    selectSession(selectedSession);
  } else {
    loadState();
  }
}

function renderFilterOptions() {
  const select = document.getElementById('filter-tool');
  const selected = select.value;
  const tools = [...new Set(events.map(e => e.tool).filter(Boolean))].sort();
  select.innerHTML = '<option value="">all tools</option>' +
    tools.map(tool => `<option value="${escHtml(tool)}">${escHtml(tool)}</option>`).join('');
  if (tools.includes(selected)) select.value = selected;
}

function exportSession() {
  if (!selectedSession) return;
  window.location.href = `/api/session?id=${encodeURIComponent(selectedSession)}&download=1`;
}

// ---------------------------------------------------------------------------
// Render rules table
// ---------------------------------------------------------------------------
function renderRules() {
  const container = document.getElementById('rules-table');
  if (!rulesData || rulesData.length === 0) {
    container.innerHTML = '<div class="text-xs text-gray-600 px-2 py-2">No rules loaded.</div>';
    return;
  }

  container.innerHTML = rulesData.map(rule => {
    const dot = rule.enabled ? '<span class="rule-dot-on">&#9679;</span>' : '<span class="rule-dot-off">&#9675;</span>';
    const srcBadge = rule.source === 'core' ? '<span class="badge badge-core">core</span>' : '<span class="badge badge-lib">library</span>';
    const status = rule.enabled ? '<span class="text-green-400 text-xs">enabled</span>' : '<span class="text-gray-600 text-xs">disabled</span>';

    let btn = '';
    if (rule.source === 'library' && rule.editable) {
      if (rule.enabled) {
        btn = `<button class="btn-sm btn-disable ml-2" onclick="policyDisable('${rule.name}', this)">disable</button>`;
      } else {
        btn = `<button class="btn-sm btn-enable ml-2" onclick="policyEnable('${rule.name}', this)">enable</button>`;
      }
    }

    return `<div class="flex items-center gap-2 py-1 px-2 hover:bg-gray-900 rounded">
      <span class="flex-none">${dot}</span>
      <span class="flex-none text-gray-300" style="width:220px;overflow:hidden;text-overflow:ellipsis">${rule.name}</span>
      <span class="flex-none">${srcBadge}</span>
      <span class="flex-none">${status}</span>
      <span>${btn}</span>
      ${rule.source === 'library' && !rule.editable ? '<span class="text-gray-600 text-xs">read-only</span>' : ''}
    </div>`;
  }).join('');
}

function renderAudit() {
  const container = document.getElementById('audit-table');
  if (!auditEvents.length) {
    container.innerHTML = '<div class="text-xs text-gray-600 px-2 py-2">No audit events available.</div>';
    return;
  }
  container.innerHTML = auditEvents.map(ev => {
    const t = ev.time ? new Date(ev.time).toLocaleString() : '—';
    return `<div class="grid grid-cols-4 gap-3 py-1 px-2 hover:bg-gray-900 rounded text-xs">
      <span class="text-gray-500">${escHtml(t)}</span>
      <span class="text-yellow-400">${escHtml(ev.action || '—')}</span>
      <span class="text-gray-300 truncate" title="${escHtml(ev.rule_id || '')}">${escHtml(ev.rule_id || '—')}</span>
      <span class="text-gray-500">${escHtml(ev.user || '—')}</span>
    </div>`;
  }).join('');
}

async function policyEnable(name, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const r = await fetch(`/api/policy/enable?name=${encodeURIComponent(name)}`, {method:'POST'});
    const data = await r.json();
    if (data.error) { alert('Error: ' + data.error); btn.disabled = false; btn.textContent = 'enable'; return; }
    // Optimistic update
    const rule = rulesData.find(x => x.name === name);
    if (rule) rule.enabled = true;
    renderRules();
  } catch(e) { btn.disabled = false; btn.textContent = 'enable'; }
}

async function policyDisable(name, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const r = await fetch(`/api/policy/disable?name=${encodeURIComponent(name)}`, {method:'POST'});
    const data = await r.json();
    if (data.error) { alert('Error: ' + data.error); btn.disabled = false; btn.textContent = 'disable'; return; }
    const rule = rulesData.find(x => x.name === name);
    if (rule) rule.enabled = false;
    renderRules();
  } catch(e) { btn.disabled = false; btn.textContent = 'disable'; }
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
// Pane resize drag logic
document.addEventListener('mousedown', e => {
  const drag = e.target.closest('.pane-drag-h, .pane-drag-v');
  if (!drag) return;
  e.preventDefault();
  const isH = drag.classList.contains('pane-drag-h');
  const pane = drag.dataset.pane;
  drag.classList.add('active');
  document.body.style.cursor = isH ? 'col-resize' : 'row-resize';
  document.body.style.userSelect = 'none';

  let target;
  if (pane === 'sidebar') target = document.getElementById('sidebar-pane');
  else if (pane === 'audit') target = document.getElementById('audit-pane');
  else if (pane === 'rules') target = document.getElementById('rules-pane');
  if (!target) return;

  const startPos = isH ? e.clientX : e.clientY;
  const startSize = isH ? target.offsetWidth : target.offsetHeight;
  const grows = pane === 'sidebar';

  const onMove = ev => {
    const delta = (isH ? ev.clientX : ev.clientY) - startPos;
    const newSize = Math.max(80, startSize + (grows ? delta : -delta));
    if (isH) target.style.width = newSize + 'px';
    else target.style.height = newSize + 'px';
  };
  const onUp = () => {
    drag.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

// Column resize drag logic
let tlColWidths = [64, 52, 120, null, 70]; // null = flex (1fr)
function applyColWidths() {
  const cols = tlColWidths.map(w => w == null ? '1fr' : w + 'px').join(' ');
  document.documentElement.style.setProperty('--tl-cols', cols);
}
document.addEventListener('mousedown', e => {
  const handle = e.target.closest('.col-resize-handle');
  if (!handle) return;
  e.preventDefault();
  const col = parseInt(handle.dataset.col);
  const startX = e.clientX;
  const headerGrid = document.getElementById('tl-header-grid');
  if (!headerGrid) return;
  const cells = headerGrid.children;
  const startW = cells[col].getBoundingClientRect().width;
  handle.classList.add('active');
  const onMove = ev => {
    const newW = Math.max(30, startW + ev.clientX - startX);
    tlColWidths[col] = Math.round(newW);
    applyColWidths();
  };
  const onUp = () => {
    handle.classList.remove('active');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderAll() {
  renderSessions();
  renderTimeline();
  renderFilterOptions();
  renderSource();
  updateCounters();
}

function renderSource() {
  if (!sourceStatus) return;
  const badge = document.getElementById('source-badge');
  const warning = document.getElementById('source-warning');
  badge.textContent = `source: ${sourceStatus.kind} · ${sourceStatus.path || 'unknown'}`;
  badge.title = sourceStatus.live_path ? `snapshot: ${sourceStatus.path}\nlive: ${sourceStatus.live_path}` : (sourceStatus.path || '');
  warning.textContent = sourceStatus.warning || '';
  warning.classList.toggle('hidden', !sourceStatus.warning);
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
loadState();
loadRules();
loadAudit();
connectSSE();
</script>
